services:
  - type: web
    name: sarateal
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_NAME
        value: Sarateal
      - key: APP_VERSION
        value: 0.1.0
      - key: DATABASE_URL
        sync: false